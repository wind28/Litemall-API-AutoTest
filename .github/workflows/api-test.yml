name: Litemall API AutoTest CI

# 触发条件：当 push 代码到 main 或 master 分支时自动执行
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # 使用 GitHub 免费提供的 Ubuntu 服务器

    steps:
    - name: 1. 拉取最新代码
      uses: actions/checkout@v3

    - name: 2. 配置 Python 3.10 环境
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: 3. 安装项目依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. 自动化语法检查与用例收集 (Dry Run)
      run: |
        # 使用 collect-only 只收集不执行，避免在云端找不到 localhost 数据库
        pytest --collect-only -q